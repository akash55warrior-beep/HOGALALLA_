<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — HOGALALLA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <a href="index.html" class="logo">HOGA<span>LALLA</span></a>
    <ul class="nav-links"><li><a href="shop.html">Continue Shopping</a></li></ul>
    <div class="nav-actions">
      <a href="cart.html" class="icon-btn" title="Cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/></svg>
        <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="wrap auth-shell">
  <div class="auth-head">
    <h1>Welcome Back</h1>
    <p>Log in to track orders and check out faster</p>
  </div>

  <div class="form-card">
    <button class="oauth-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.2 0-9.6-3.1-11.3-7.6l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.2C40.9 36 44 30.5 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
      Continue with Google
    </button>

    <div class="divider">Or</div>

    <div id="phoneStep">
      <div class="field">
        <label>Mobile Number</label>
        <input type="tel" id="phoneInput" placeholder="+91 98765 43210">
      </div>
      <button class="btn btn-primary btn-block" id="sendOtpBtn">Send OTP</button>
    </div>

    <div id="otpStep" style="display:none;">
      <div class="field">
        <label>Enter OTP sent to <span id="phoneDisplay"></span></label>
        <input type="text" id="otpInput" maxlength="6" placeholder="6-digit code">
      </div>
      <button class="btn btn-primary btn-block" id="verifyOtpBtn">Verify & Login</button>
      <button class="btn btn-outline btn-block" id="backBtn" style="margin-top:10px;">Use a different number</button>
    </div>
  </div>

  <p class="auth-switch">By continuing you agree to HOGALALLA's <a href="about.html">Terms</a> & Privacy Policy</p>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  /* -----------------------------------------------------------
     INTEGRATION POINT:
     Google  -> supabase.auth.signInWithOAuth({ provider: 'google' })
     Phone   -> supabase.auth.signInWithOtp({ phone })
                then supabase.auth.verifyOtp({ phone, token, type: 'sms' })
     This demo just mocks a logged-in session in localStorage.
  ----------------------------------------------------------- */
  document.getElementById('googleBtn').addEventListener('click', () => {
    setUser({ name: 'Google User', method: 'google', email: 'you@gmail.com' });
    showToast('Logged in with Google');
    setTimeout(() => window.location.href = 'account.html', 700);
  });

  document.getElementById('sendOtpBtn').addEventListener('click', () => {
    const phone = document.getElementById('phoneInput').value.trim();
    if (!phone) { showToast('Enter your mobile number'); return; }
    document.getElementById('phoneDisplay').textContent = phone;
    document.getElementById('phoneStep').style.display = 'none';
    document.getElementById('otpStep').style.display = 'block';
    showToast('OTP sent (demo: use 123456)');
  });

  document.getElementById('verifyOtpBtn').addEventListener('click', () => {
    const otp = document.getElementById('otpInput').value.trim();
    if (otp.length < 4) { showToast('Enter a valid OTP'); return; }
    setUser({ name: 'Guest', method: 'phone', phone: document.getElementById('phoneInput').value });
    showToast('Logged in');
    setTimeout(() => window.location.href = 'account.html', 700);
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    document.getElementById('otpStep').style.display = 'none';
    document.getElementById('phoneStep').style.display = 'block';
  });
</script>
</body>
</html>
