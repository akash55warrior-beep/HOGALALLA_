<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — HOGALALLA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <a href="index.html" class="logo">HOGA<span>LALLA</span></a>
    <ul class="nav-links"><li><a href="shop.html">Continue Shopping</a></li></ul>
    <div class="nav-actions">
      <a href="cart.html" class="icon-btn" title="Cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/></svg>
        <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="wrap page-head">
  <div class="breadcrumb"><a href="index.html">Home</a> / <a href="cart.html">Cart</a> / Checkout</div>
  <h1 class="page-title">Checkout</h1>
  <div class="checkout-steps">
    <span class="step active">1. Shipping</span>
    <span class="step">2. Payment</span>
    <span class="step">3. Confirmation</span>
  </div>
</div>

<div class="wrap checkout-grid">
  <div>
    <div class="form-card" style="margin-bottom:20px;">
      <h3>Shipping Address</h3>
      <form id="addrForm">
        <div class="field-row">
          <div class="field"><label>Full Name</label><input type="text" id="fullName" required></div>
          <div class="field"><label>Phone Number</label><input type="tel" id="phone" required></div>
        </div>
        <div class="field"><label>Address Line 1</label><input type="text" id="addr1" required></div>
        <div class="field"><label>Address Line 2 (optional)</label><input type="text" id="addr2"></div>
        <div class="field-row">
          <div class="field"><label>City</label><input type="text" id="city" required></div>
          <div class="field"><label>State</label><input type="text" id="state" required></div>
        </div>
        <div class="field-row">
          <div class="field"><label>Pincode</label><input type="text" id="pincode" required></div>
          <div class="field"><label>Country</label><input type="text" id="country" value="India" required></div>
        </div>
      </form>
    </div>

    <div class="form-card">
      <h3>Payment Method</h3>
      <div class="pay-options">
        <label class="pay-opt active">
          <input type="radio" name="pay" checked style="accent-color:var(--sky);">
          <span>UPI / Cards / Netbanking (Razorpay)</span>
        </label>
        <label class="pay-opt">
          <input type="radio" name="pay" style="accent-color:var(--sky);">
          <span>Cash on Delivery</span>
        </label>
      </div>
      <p style="color:var(--muted); font-size:12px; margin-top:14px;">
        Payment is processed securely — HOGALALLA never stores your card details. On successful payment your order is sent straight to production.
      </p>
    </div>
  </div>

  <div class="summary-card" id="orderSummary"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="supabase-client.js"></script>
<script src="app.js"></script>
<script>
async function initCheckout() {
  await loadAllProducts();
  const cart = getCart();
  if (cart.length === 0) { window.location.href = 'cart.html'; return; }

  const saved = getAddress();
  if (saved) {
    fullName.value = saved.fullName || '';
    phone.value = saved.phone || '';
    addr1.value = saved.addr1 || '';
    addr2.value = saved.addr2 || '';
    city.value = saved.city || '';
    state.value = saved.state || '';
    pincode.value = saved.pincode || '';
    country.value = saved.country || 'India';
  }

  const total = cartTotal();
  const shipping = total > 1500 ? 0 : 99;

  document.getElementById('orderSummary').innerHTML = `
    <h3>Order Summary</h3>
    ${cart.map(item => {
      const p = getProduct(item.id);
      return p ? `<div class="mini-order-item"><span>${p.name} × ${item.qty} (${item.size})</span><span>${formatINR(p.price * item.qty)}</span></div>` : '';
    }).join('')}
    <div class="summary-row" style="margin-top:14px;"><span>Subtotal</span><span>${formatINR(total)}</span></div>
    <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'Free' : formatINR(shipping)}</span></div>
    <div class="summary-row total"><span>Total</span><span>${formatINR(total + shipping)}</span></div>
    <button class="btn btn-primary btn-block btn-lg" id="placeOrderBtn" style="margin-top:18px;">Place Order</button>
    <p style="font-size:11px; color:var(--muted); margin-top:12px; text-align:center;">By placing your order you agree to our Terms & Refund Policy</p>
  `;

  document.getElementById('placeOrderBtn').addEventListener('click', () => {
    const form = document.getElementById('addrForm');
    if (!form.checkValidity()) { form.reportValidity(); return; }

    const address = {
      fullName: fullName.value, phone: phone.value, addr1: addr1.value, addr2: addr2.value,
      city: city.value, state: state.value, pincode: pincode.value, country: country.value
    };
    saveAddress(address);

    /* -----------------------------------------------------------
       INTEGRATION POINT:
       1) Trigger Razorpay checkout here with the order total.
       2) On payment success, call your Supabase Edge Function,
          which sends POST /shops/{shop_id}/orders.json to Printify
          with `address` as the shipping address and the cart's
          variant IDs + quantities as line items.
       3) Store the returned Printify order ID against this order
          in your Supabase `orders` table.
       This demo simulates a successful order directly.
    ----------------------------------------------------------- */
    localStorage.setItem('hogalalla_last_order', JSON.stringify({ cart, address, total: total + shipping, id: 'HGL' + Date.now().toString().slice(-8) }));
    localStorage.removeItem(CART_KEY);
    window.location.href = 'order-confirmation.html';
  });
}
initCheckout();
</script>
</body>
</html>
