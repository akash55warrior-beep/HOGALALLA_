<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — HOGALALLA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <a href="index.html" class="logo">HOGA<span>LALLA</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <a href="account.html" class="icon-btn" data-nav="account" title="Account">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      </a>
      <a href="cart.html" class="icon-btn" title="Cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8h12l-1 12H7L6 8z"/><path d="M9 8V6a3 3 0 016 0v2"/></svg>
        <span class="cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="wrap page-head">
  <div class="breadcrumb"><a href="index.html">Home</a> / Contact</div>
  <h1 class="page-title">Get In Touch</h1>
</div>

<div class="wrap" style="max-width:560px; padding-bottom:80px;">
  <div class="form-card">
    <h3>Send a message</h3>
    <form id="contactForm">
      <div class="field"><label>Name</label><input type="text" required></div>
      <div class="field"><label>Email</label><input type="email" required></div>
      <div class="field"><label>Order ID (if applicable)</label><input type="text"></div>
      <div class="field"><label>Message</label><input type="text" required placeholder="How can we help?"></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Send Message</button>
    </form>
  </div>
</div>

<footer class="footer">
  <div class="wrap">
    <div class="footer-bottom" style="border-top:1px solid var(--line); padding-top:24px;">
      <span>© 2026 HOGALALLA. All rights reserved.</span>
      <span>Made on demand · Fulfilled via Printify</span>
    </div>
  </div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  document.getElementById('contactForm').addEventListener('submit', e => {
    e.preventDefault();
    showToast('Message sent — we\'ll reply soon');
    e.target.reset();
  });
</script>
</body>
</html>
